apiVersion: apps/v1
kind: Deployment
metadata:
  name: careermatrix-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: careermatrix
  template:
    metadata:
      labels:
        app: careermatrix
    spec:
      containers:
      - name: careermatrix
        image: YOUR_ECR_IMAGE_URL
        ports:
        - containerPort: 8501
